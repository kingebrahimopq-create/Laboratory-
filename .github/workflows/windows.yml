# .github/workflows/windows.yml
name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Build Web App
      run: npm run build

    - name: Compile Windows Installer
      run: npx electron-builder --win -c electron-builder.json

    - name: Upload Windows Executable
      uses: actions/upload-artifact@v7
      with:
        name: MyLab-Windows-App
        path: dist-electron/**/*.exe

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.0"
        name: "My Lab LIMS v1.0.0 (التطبيقات الطبية الجاهزة)"
        body: |
          مرحباً بك! هنا تجد أحدث البنايات التلقائية للتطبيقات الطبية بنسخ مخصصة للتحميل المباشر دون الحاجة لتسجيل الدخول:
          
          * 📱 **تطبيق الأندرويد (.apk):** متكامل ومحدث فورياً للعمل على الجوالات والأجهزة الكفية الكبيرة.
          * 💻 **تطبيق الويندوز (.exe):** حزمة تثبيت بضغطة واحدة لأجهزة الحاسوب لسطح المكتب في الإستقبال والمختبر.
        draft: false
        prerelease: false
        files: |
          dist-electron/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
