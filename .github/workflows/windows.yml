# .github/workflows/windows.yml
  name: Build Windows Application

  on:
    push:
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]

  permissions:
    contents: write

  jobs:
    build:
      runs-on: windows-latest

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Compile Windows Installer
        run: npx electron-builder --win -c electron-builder.json

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Windows-App
          path: dist-electron/**/*.exe

      - name: Create or Update GitHub Release with Windows App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.0"
          name: "My Lab LIMS v2.0.0 - إصلاح Google Sign-in والبيانات الوهمية"
          body: |
            ## التحديثات في هذا الإصدار

            ### ✅ إصلاحات Google Sign-in
            - تم استبدال signInWithPopup بـ signInWithRedirect لتجنب مشكلة IFrame
            - الاتصال بـ Google Drive يعمل الآن بشكل صحيح

            ### ✅ إزالة البيانات الوهمية
            - تم حذف حسابات demo الوهمية
            - يظهر الآن خطأ حقيقي عند فشل تسجيل الدخول

            ### 💻 تثبيت تطبيق Windows
            - شغّل ملف .exe لتثبيت التطبيق

            ### 📱 تطبيق Android
            - راجع ملف app-debug.apk المرفق أيضاً
          draft: false
          prerelease: false
          files: dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  