name: Build Windows & Android Applications

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop Client
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: package Electron App
        run: |
          npx electron-builder --win -c electron-builder.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Windows-App
          path: dist-electron/**/*.exe

      - name: Upload Windows Executable to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        with:
          tag_name: "v1.0.0"
          name: "My Lab LIMS v1.0.0 (التطبيقات الطبية الجاهزة)"
          body: |
            مرحباً بك! هنا تجد أحدث البنايات التلقائية للتطبيقات الطبية بنسخ مخصصة للتحميل المباشر دون الحاجة لتسجيل الدخول:
            
            * 📱 **تطبيق الأندرويد (.apk):** متكامل ومحدث فورياً للعمل على الجوالات والأجهزة الكفية الكبيرة.
            * 💻 **تطبيق الويندوز (.exe):** حزمة تثبيت بضغطة واحدة لأجهزة الحاسوب لسطح المكتب في الإستقبال والمختبر.
          draft: false
          prerelease: false
          files: dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android Mobile Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK (Debug & Unsigned Release)
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Android-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        with:
          tag_name: "v1.0.0"
          name: "My Lab LIMS v1.0.0 (التطبيقات الطبية الجاهزة)"
          body: |
            مرحباً بك! هنا تجد أحدث البنايات التلقائية للتطبيقات الطبية بنسخ مخصصة للتحميل المباشر دون الحاجة لتسجيل الدخول:
            
            * 📱 **تطبيق الأندرويد (.apk):** متكامل ومحدث فورياً للعمل على الجوالات والأجهزة الكفية الكبيرة.
            * 💻 **تطبيق الويندوز (.exe):** حزمة تثبيت بضغطة واحدة لأجهزة الحاسوب لسطح المكتب في الإستقبال والمختبر.
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
