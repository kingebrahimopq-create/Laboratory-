name: Build & Release Applications

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0)'
        required: true
        default: '2.0.0'

permissions:
  contents: write

jobs:
  build-web:
    name: Build Web Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Web Assets
        run: npm run build
      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Web-App
          path: dist/
          retention-days: 30

  build-windows:
    name: Build Windows Desktop App
    needs: build-web
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Web Assets
        run: npm run build
      - name: Build Windows Installer
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_ENV: production
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Windows-App
          path: dist-electron/*.exe
          if-no-files-found: warn

  build-android:
    name: Build Android Mobile App
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Build Web Assets
        run: npm run build
      - name: Capacitor Setup Android
        run: |
          if [ -f android/app/google-services.json ]; then
            cp android/app/google-services.json /tmp/google-services.json
          fi
          rm -rf android
          npx cap add android
          if [ -f /tmp/google-services.json ]; then
            cp /tmp/google-services.json android/app/google-services.json
          fi
          npx cap sync android
          npx cap copy android
      - name: Make gradlew Executable
        working-directory: android
        run: chmod +x gradlew
      - name: Build Android APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  create-release:
    name: Create Release Summary
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            # My Lab LIMS - Medical Laboratory Application
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
