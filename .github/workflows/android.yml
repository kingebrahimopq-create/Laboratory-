name: Build Android Application

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project (Vite)
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Add Android Platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Regenerate Gradle Wrapper (fix LFS pointer issue)
        working-directory: android
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          curl -fsSL -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Laboratory-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.0"
          name: "My Lab LIMS v2.0.0 - نظام إدارة المختبرات"
          body: |
            ## التحديثات في هذا الإصدار

            - إصلاح Google Sign-in (localhost مضاف لـ Firebase Authorized Domains)
            - إصلاح تسجيل الدخول بالبريد وكلمة المرور
            - دعم Firebase Storage للنسخ الاحتياطي

            ### تثبيت Android
            فعّل "تثبيت من مصادر غير معروفة" ثم ثبّت app-debug.apk
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
