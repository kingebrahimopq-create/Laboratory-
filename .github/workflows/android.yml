# .github/workflows/android.yml
name: Build Android Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup Java SDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Build React App
      run: npm run build

    - name: Initialize Capacitor
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: MyLab-Android-App
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.0"
        name: "My Lab LIMS v1.0.0 (التطبيقات الطبية الجاهزة)"
        body: |
          مرحباً بك! هنا تجد أحدث البنايات التلقائية للتطبيقات الطبية بنسخ مخصصة للتحميل المباشر دون الحاجة لتسجيل الدخول:
          
          * 📱 **تطبيق الأندرويد (.apk):** متكامل ومحدث فورياً للعمل على الجوالات والأجهزة الكفية الكبيرة.
          * 💻 **تطبيق الويندوز (.exe):** حزمة تثبيت بضغطة واحدة لأجهزة الحاسوب لسطح المكتب في الإستقبال والمختبر.
        draft: false
        prerelease: false
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
