name: Build Android Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets for Capacitor
        run: npm run build
        env:
          CAPACITOR_BUILD: 'true'

      - name: Capacitor Setup Android
        run: |
          if [ -f android/app/google-services.json ]; then
            cp android/app/google-services.json /tmp/google-services.json
          fi
          rm -rf android
          npx cap add android
          if [ -f /tmp/google-services.json ]; then
            cp /tmp/google-services.json android/app/google-services.json
          fi
          npx cap sync android
          npx cap copy android

      - name: Make gradlew Executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MyLab-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
