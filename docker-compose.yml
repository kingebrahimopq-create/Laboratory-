version: '3.8'

services:
  mylab-lims:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mylab-lims
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - mylab-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mylab-network

  # PostgreSQL Database (Optional - uncomment to enable)
