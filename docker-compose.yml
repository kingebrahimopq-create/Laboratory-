  #     POSTGRES_DB: mylab
  #     POSTGRES_USER: mylab_user
  #     POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - mylab-network

  # Redis Cache (Optional - uncomment to enable)
  # redis:
  #   image: redis:7-alpine
